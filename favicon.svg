<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A38"/>
      <stop offset="100%" stop-color="#145237"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Letter К in Playfair Display style (serif) -->
  <text x="170" y="400" font-family="'Playfair Display', 'Georgia', serif" font-weight="900" font-size="420" fill="#FFFFFF" letter-spacing="-10">К</text>
  <!-- Gold accent dot -->
  <circle cx="410" cy="390" r="36" fill="#F5A623"/>
</svg>
