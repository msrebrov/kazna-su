server {
    listen 80;
    server_name kazna.su www.kazna.su;
    return 301 https://kazna.su$request_uri;
}

server {
    listen 443 ssl;
    server_name www.kazna.su;
    ssl_certificate /etc/letsencrypt/live/kazna.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kazna.su/privkey.pem;
    return 301 https://kazna.su$request_uri;
}

server {
    listen 443 ssl;
    server_name kazna.su;

    ssl_certificate /etc/letsencrypt/live/kazna.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kazna.su/privkey.pem;

    root /var/www/kazna.su;
    index index.html;

    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://*.max.ru https://max.ru;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/kazna.su.access.log;
    error_log /var/log/nginx/kazna.su.error.log;
}
